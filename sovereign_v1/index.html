<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cold_XRAG PRO | Sovereign Control V36</title>
    <style>
        :root {--primary: #00ff88; --bg: #000; --panel: #050505; --border: #1a1a1a; --meta: #444; --gold: #3d331b;}
        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: #eee; font-family: 'Inter', 'JetBrains Mono', monospace; height: 100vh; overflow: hidden; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: linear-gradient(180deg, var(--gold) 0%, #1a140a 100%); border: 1px solid #2a2214; border-radius: 3px; }
        
        #layer-master { display: grid; grid-template-rows: 160px 1fr; height: 100vh; width: 100vw; }
        .rigid-header { display: flex; flex-direction: column; background: #050505; border-bottom: 2px solid var(--border); }
        .h-top { flex: 1; display: flex; justify-content: space-between; align-items: center; padding: 0 50px; }
        
        /* 1. THE LOGO FIX */
        .logo-giant { height: 110px; width: 110px; filter: drop-shadow(0 0 15px var(--primary)); object-fit: contain; }
        
        .brand-title { font-size: 2.6rem; font-weight: 900; letter-spacing: 5px; text-transform: uppercase; }
        .h-bottom { height: 40px; background: #010101; display: flex; align-items: center; justify-content: center; gap: 40px; border-top: 1px solid #111;}
        .p-step { border: 1px solid #222; font-size: 9px; padding: 5px 15px; color: #444; }
        .p-step.active { border-color: var(--primary); color: var(--primary); box-shadow: 0 0 10px var(--primary); }
        .p-step.done { background: var(--primary); color: #000; font-weight: bold; }

        .workspace { display: grid; grid-template-columns: 350px 1fr 340px; height: 100%; overflow: hidden; }
        .axiom-tree { background: #020202; border-right: 1px solid var(--border); padding: 30px; overflow-y: auto; height: 100%; scrollbar-gutter: stable; }
        .model-view { display: flex; flex-direction: column; padding: 20px; background: #000; gap: 15px; height: 100%; overflow: hidden; }
        .instrument { flex: 1; border: 1px solid var(--primary); background: #020202; display: flex; flex-direction: column; position: relative; box-shadow: inset 0 0 60px rgba(0,255,136,0.05); overflow: hidden; }
        .tabs { display: flex; background: #000; border-bottom: 1px solid var(--border); }
        .t-btn { background: none; border: none; color: #444; padding: 15px 30px; font-size: 10px; font-weight: bold; cursor: pointer; }
        .t-btn.active { color: var(--primary); border-bottom: 2px solid var(--primary); background: rgba(0,255,136,0.05); }
        
        #canvas-wrap { flex: 1; position: relative; overflow: hidden; background-image: radial-gradient(#111 1px, transparent 1px); background-size: 20px 20px; }
        canvas { display: block; width: 100%; height: 100%; }
        #formula-overlay { position: absolute; top: 40px; left: 40px; color: var(--primary); font-size: 2rem; z-index: 10; text-shadow: 0 0 10px #000; }
        
        .io-nexus { height: 180px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; flex-shrink: 0; }
        .term { background: #000; border: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
        .term-h { font-size: 9px; color: var(--meta); padding: 5px 15px; background: #080808; border-bottom: 1px solid #111; letter-spacing: 2px; }
        .log {flex: 1; padding: 12px; font-size: 10px; color: #333; font-family: monospace; overflow-y: auto; scrollbar-gutter: stable; }

        .audit-side { background: #030303; border-left: 1px solid var(--border); padding: 30px; display: flex; flex-direction: column; gap: 20px; height: 100%; overflow: hidden; }
        .score-hero { font-size: 3.5rem; color: var(--primary); font-weight: 800; text-align: center; border: 1px solid var(--border); padding: 20px; background: #000; flex-shrink: 0; }
        .dom-head { color: var(--primary); font-size: 13px; font-weight: bold; margin: 20px 0 10px; border-bottom: 1px solid #111; }
        .axiom-leaf { font-size: 11px; color: #444; padding: 4px 15px; cursor: pointer; border-left: 1px solid #1a1a1a; transition: 0.2s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .axiom-leaf.active, .axiom-leaf:hover { color: var(--primary); background: rgba(0,255,136,0.05); border-left-color: var(--primary); }
    </style>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body>
<div id="layer-master">
    <header class="rigid-header">
        <div class="h-top">
            <div style="display: flex; align-items:center; gap:40px;">
                <img src="static/aichip-logo.png" class="logo-giant" alt="AIChip Logo">
                <span class="brand-title">Cold_XRAG <span style="color:var(--primary)">PRO</span></span>
            </div>
            <div style="text-align:right; font-size:11px; color:var(--meta);">
                IMS_CLUSTER: <b style="color:var(--primary)">STABLE</b><br>
                UPASL_GEN: <b style="color:var(--primary)">ACTIVE</b><br>
                UUID: 4ec055ab
            </div>
        </div>
        <div class="h-bottom">
            <div class="p-step done">L1_INGEST</div>
            <div class="p-step active">L2_UPASL</div>
            <div class="p-step">L3_IMS</div>
            <div class="p-step">L4_CAUSAL</div>
            <div class="p-step">L5_AUDIT</div>
        </div>
    </header>
    <section class="workspace">
        <aside class="axiom-tree" id="tree-mount"></aside>
        <main class="model-view">
            <div class="instrument">
                <div class="tabs">
                    <button class="t-btn" onclick="app.render('core')">CORE</button>
                    <button class="t-btn active" id="btn-gnn" onclick="app.render('gnn')">GNN</button>
                    <button class="t-btn" onclick="app.render('world')">WORLD</button>
                    <button class="t-btn" onclick="app.render('causal')">CAUSAL</button>
                </div>
                <div id="canvas-wrap">
                    <div id="formula-overlay">\( \eta_{ij} \cdot \dot{u}_i \)</div>
                    <canvas id="main-render"></canvas>
                </div>
            </div>
            <div class="io-nexus">
                <div class="term"><div class="term-h">IMS: DATA MONITOR</div><div id="log-ims" class="log">WAITING...</div></div>
                <div class="term"><div class="term-h">UPASL: TRACE ENGINE</div><div id="log-upasl" class="log">WAITING...</div></div>
            </div>
        </main>
        <aside class="audit-side">
            <div class="score-hero" id="main-score">0.854</div>
            <div id="audit-list" style="flex:1; overflow-y:auto; border-top:1px solid #111; padding-top:15px;"></div>
            <button class="p-step done" style="width:100%; height:50px; cursor:pointer;" onclick="alert('Report Generated')">GENERATE AUDIT REPORT</button>
        </aside>
    </section>
</div>
<script src="js/axioms.js"></script>
<script>
const app = {
    v: 'gnn',
    init() {
        const mount = document.getElementById('tree-mount');
        // Check if axioms exist, fallback if not (so the UI doesn't break if axioms.js is missing)
        const axioms = window.axiomSubstrate || [];
        const groups = {}; 
        axioms.forEach(a => {
            const d = a.type ? a.type.toUpperCase() : "DOMAIN"; 
            if(!groups[d]) groups[d] = []; groups[d].push(a);
        });
        Object.keys(groups).forEach(g => {
            const div = document.createElement('div');
            div.innerHTML = `<div class="dom-head">${g}</div>`;
            groups[g].forEach(a => {
                const l = document.createElement('div'); l.className = 'axiom-leaf';
                l.innerText = `${a.id}: ${a.name}`;
                l.onclick = () => this.audit(a, l); div.appendChild(l);
            });
            mount.appendChild(div);
        });
        window.onresize = () => this.render(this.v);
        this.render('gnn');
    },
    audit(ax, el) {
        document.querySelectorAll('.axiom-leaf').forEach(x => x.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('main-score').innerText = (0.8 + Math.random() * 0.15).toFixed(3);
        const over = document.getElementById('formula-overlay');
        over.innerHTML = `\\[ ${ax.formula || ''} \\]`;
        if(window.MathJax) MathJax.typesetPromise([over]);
    },
    render(view) {
        this.v = view;
        document.querySelectorAll('.t-btn').forEach(b => b.classList.toggle('active', b.innerText.toLowerCase() === view));
        const c = document.getElementById('main-render'); const ctx = c.getContext('2d');
        c.width = c.parentElement.clientWidth; c.height = c.parentElement.clientHeight;
        ctx.clearRect(0,0,c.width,c.height);
        if(view === 'gnn') this.drawGNN(ctx, c);
    },
    drawGNN(ctx, c) {
        const nodes = Array.from({length:25}, (_,i) => ({
            x: c.width/2 + Math.cos(i)*180, y: c.height/2 + Math.sin(i)*180
        }));
        ctx.strokeStyle = 'rgba(0, 255, 136, 0.1)';
        nodes.forEach(n => {
            nodes.forEach(m => { ctx.beginPath(); ctx.moveTo(n.x, n.y); ctx.lineTo(m.x, m.y); ctx.stroke(); });
            ctx.fillStyle = '#00ff88'; ctx.beginPath(); ctx.arc(n.x, n.y, 4, 0, 7); ctx.fill();
        });
    }
}; window.onload = () => app.init();
</script>
</body>
</html>
